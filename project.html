<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project — Maxin Yeager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- LOADING -->
  <div id="loading-screen">
    <p class="loader-logo">Maxin <span>Yeager</span></p>
    <div class="loader-bar-wrap"><div class="loader-bar"></div></div>
    <p class="loader-text">Loading project…</p>
  </div>

  <!-- NAVBAR -->
  <nav class="bottom-nav">
    <button class="nav-item" data-target="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-item" data-target="about">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span class="nav-label">About</span>
    </button>
    <button class="nav-item" data-target="projects">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      <span class="nav-label">Projects</span>
    </button>
    <button class="nav-item" data-target="experience">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg>
      <span class="nav-label">Work</span>
    </button>
    <button class="nav-item" data-target="connect">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      <span class="nav-label">Connect</span>
    </button>
  </nav>

  <div class="page-wrapper">
    <div style="min-height:100svh; background:radial-gradient(ellipse 80% 50% at 50% 0%, var(--g700) 0%, var(--g900) 65%);">

      <!-- id="detail-wrap" is what script.js detects to know it's the detail page -->
      <main class="detail-page" id="detail-wrap">

        <a class="detail-back" href="index.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          Back to all projects
        </a>

        <!-- ── Auto-scroll vertical carousel ── -->
        <div class="vcarousel-outer reveal">
          <span class="vcarousel-pause-hint">Hover to pause</span>
          <div id="carousel-track"></div>
        </div>

        <!-- ── Project info ── -->
        <div class="detail-meta reveal">
          <p class="detail-eyebrow">Project Details</p>
          <h1 class="detail-name-el" id="detail-name"></h1>
          <div class="detail-tech-tags" id="detail-tech"></div>
          <p class="detail-desc-el" id="detail-desc"></p>
        </div>

        <!-- ── Action buttons ── -->
        <div class="detail-actions reveal">
          <a class="btn-primary" id="detail-live" href="#">
            View Project
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          </a>
          <a class="btn-outline" href="index.html">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
            Back to Home
          </a>
        </div>

      </main>
    </div>

    <footer><p>© 2026 Maxin Yeager · Built with care by Maxin Labs</p></footer>
  </div>

  <!-- MODAL -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal">
      <button id="modal-close" class="modal-close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <h2 class="modal-title">Let's talk</h2>
      <p class="modal-sub">I'll get back to you within 24 hours.</p>
      <form id="contact-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="cf-name">Your name</label>
          <input class="form-input" type="text" id="cf-name" name="name" placeholder="e.g. Maxin Emmanuel" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="cf-email">Email address</label>
          <input class="form-input" type="email" id="cf-email" name="email" placeholder="youremail@google.com" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="cf-whatsapp">WhatsApp number</label>
          <input class="form-input" type="tel" id="cf-whatsapp" name="whatsapp" placeholder="+234 800 000 0000" />
        </div>
        <div class="form-group">
          <label class="form-label" for="cf-message">Message</label>
          <textarea class="form-textarea" id="cf-message" name="message" placeholder="Tell me about your project…" required></textarea>
        </div>
        <button type="submit" class="btn-submit">Send Message</button>
      </form>
      <div id="form-success" class="form-success">
        <div class="success-icon">✅</div>
        <p>Message sent! I'll be in touch soon.</p>
      </div>
    </div>
  </div>

  <!-- scripts: data MUST load before script.js -->
  <script src="data/projects.js"></script>
  <script src="script.js"></script>
</body>
</html>
